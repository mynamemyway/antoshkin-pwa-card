<!-- templates/base.html -->

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#9FCA3D">
    <meta name="description" content="Карта лояльности Антошкин дворик - скидочная программа">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Антошкин">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- Apple Touch Icon (PNG required, SVG not supported on iOS) -->
    <link rel="apple-touch-icon" href="/static/icon-180.png">

    <!-- Title -->
    <title>{% block title %}Карта лояльности Антошкин дворик{% endblock %}</title>

    <!-- Tailwind CSS (CDN for development) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#9FCA3D',
                        'primary-dark': '#8AB530',
                    }
                }
            }
        }
    </script>

    <!-- Additional Head Content -->
    {% block extra_head %}{% endblock %}

    <!-- iOS Safari Fixes -->
    <style>
        /* Prevent zoom on input focus */
        input, select, textarea {
            font-size: 16px !important;
        }

        /* Full height for mobile */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        /* Safe area for iPhone notch */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">
    <!-- Main Content (scrollable if needed) -->
    <main class="flex-grow overflow-y-auto">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer (always visible at bottom) -->
    <footer class="bg-white border-t border-gray-200 py-2 safe-bottom flex-shrink-0">
        <div class="container mx-auto px-4 text-center text-gray-500 text-xs">
            {% block footer %}
            <p>&copy; 2026 Антошкин дворик. Все права защищены.</p>
            {% endblock %}
        </div>
    </footer>

    <!-- JavaScript -->
    {% block scripts %}{% endblock %}

    <!-- Global Session Check Function -->
    <script>
        /**
         * Global session check function for all pages.
         * Calls /api/me to validate session (browser auto-attaches cookie).
         *
         * @param {string} pageType - Type of current page: 'index', 'card', 'verify', 'admin'
         *
         * Logic:
         * - If session valid (200 OK):
         *   - pageType === 'index' → redirect to /card/{phone}
         *   - pageType === 'verify' → redirect to /card/{phone} (already verified)
         *   - pageType === 'card' or 'admin' → continue loading
         * - If session invalid (401):
         *   - pageType === 'admin' → redirect to /
         *   - pageType === 'index' or 'verify' or 'card' → continue loading (don't redirect!)
         *
         * Usage in child templates:
         *   document.addEventListener('DOMContentLoaded', function() {
         *       checkSession('index');  // or 'card', 'verify', 'admin'
         *   });
         */
        async function checkSession(pageType) {
            try {
                const response = await fetch('/api/me', {
                    credentials: 'include'  // Browser auto-attaches HttpOnly cookie
                });

                if (response.ok) {
                    // Session is valid
                    const user = await response.json();

                    if (pageType === 'index' || pageType === 'verify') {
                        // On home or verify page with valid session → redirect to card
                        // User is already verified, no need to stay on these pages
                        window.location.href = `/card/${encodeURIComponent(user.phone)}`;
                    }
                    // For 'card', 'admin' → continue loading page

                } else {
                    // Session is invalid (401 Unauthorized)
                    if (pageType === 'admin') {
                        // On admin page without valid session → redirect to home
                        window.location.href = '/';
                    }
                    // For 'index', 'verify', 'card' → continue loading (don't redirect!)
                    // This allows the page to show content even if session check fails initially
                }
            } catch (error) {
                // Network error or server unavailable
                console.error('Session check failed:', error);
                // Continue loading page (don't block user experience)
            }
        }
    </script>
</body>
</html>
